<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Particle Galaxy</title>

<style>
body{
margin:0;
overflow:hidden;
background:radial-gradient(circle,#020617,#000);
font-family:sans-serif;
}

canvas{
display:block;
}

.ui{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
color:white;
text-align:center;
opacity:.9;
}

button{
margin-top:10px;
padding:8px 14px;
border:none;
border-radius:20px;
background:#6366f1;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<div class="ui">
<h2>Particle Galaxy</h2>
<p>Move your mouse to bend the galaxy</p>
<button onclick="explode()">Supernova</button>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]
const particleCount=700

let mouse={
x:canvas.width/2,
y:canvas.height/2
}

window.addEventListener("mousemove",e=>{
mouse.x=e.clientX
mouse.y=e.clientY
})

class Particle{

constructor(){
this.angle=Math.random()*Math.PI*2
this.radius=Math.random()*300
this.speed=0.002+Math.random()*0.003
this.size=Math.random()*2
}

update(){

this.angle+=this.speed

const x=mouse.x+Math.cos(this.angle)*this.radius
const y=mouse.y+Math.sin(this.angle)*this.radius

this.draw(x,y)

}

draw(x,y){
ctx.beginPath()
ctx.arc(x,y,this.size,0,Math.PI*2)
ctx.fillStyle="white"
ctx.fill()
}

}

function init(){

particles=[]

for(let i=0;i<particleCount;i++){
particles.push(new Particle())
}

}

function animate(){

ctx.fillStyle="rgba(0,0,0,0.2)"
ctx.fillRect(0,0,canvas.width,canvas.height)

particles.forEach(p=>p.update())

requestAnimationFrame(animate)

}

function explode(){

particles.forEach(p=>{
p.radius=Math.random()*700
p.speed+=Math.random()*0.02
})

}

window.addEventListener("resize",()=>{
canvas.width=window.innerWidth
canvas.height=window.innerHeight
})

init()
animate()
</script>

</body>
</html>
