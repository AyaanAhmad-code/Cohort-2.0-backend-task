<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Matrix Rain Code Editor</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:monospace;
}

body{
background:black;
height:100vh;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
}

/* canvas */

canvas{
position:fixed;
top:0;
left:0;
}

/* editor */

.editor{

position:relative;

width:900px;
height:520px;

background:rgba(0,0,0,.8);

border:1px solid #00ff88;

padding:30px;

color:#00ff88;

font-size:20px;

white-space:pre-wrap;

z-index:2;

box-shadow:
0 0 30px rgba(0,255,150,.4),
inset 0 0 30px rgba(0,255,150,.2);

}

/* caret */

.caret{

display:inline-block;

width:10px;
height:22px;

background:#00ff88;

margin-left:4px;

animation:blink 1s infinite;

}

@keyframes blink{
50%{opacity:0}
}

/* glitch flash */

.flash{

position:fixed;
top:0;
left:0;

width:100%;
height:100%;

background:white;

opacity:0;

pointer-events:none;

}

</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div class="editor">
<span id="text"></span><span class="caret"></span>
</div>

<textarea id="input" style="opacity:0;position:absolute;"></textarea>

<div class="flash" id="flash"></div>

<audio id="glitch"
src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3">
</audio>

<script>

/* canvas */

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

/* particles */

const particles=[]

/* matrix burst across screen */

function spawnBurst(char){

const letters="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789"

for(let i=0;i<60;i++){

particles.push({

char:Math.random()>.5
? char
: letters[Math.floor(Math.random()*letters.length)],

x:Math.random()*canvas.width,

y:-Math.random()*300,

speed:4+Math.random()*6,

alpha:1

})

}

}

/* animation */

function animate(){

ctx.fillStyle="rgba(0,0,0,.25)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.font="18px monospace"

for(let i=0;i<particles.length;i++){

let p=particles[i]

ctx.globalAlpha=p.alpha
ctx.fillStyle="#00ff88"

ctx.fillText(p.char,p.x,p.y)

p.y+=p.speed
p.alpha-=0.01

if(p.alpha<=0){
particles.splice(i,1)
i--
}

}

ctx.globalAlpha=1

requestAnimationFrame(animate)

}

animate()

/* editor */

const textarea=document.getElementById("input")
const textEl=document.getElementById("text")

let content=""

/* focus typing */

document.body.onclick=()=>{
textarea.focus()
}

/* typing */

textarea.addEventListener("input",e=>{

const value=e.target.value
const char=value.slice(-1)

content=value
textEl.innerText=content

spawnBurst(char)

})

/* enter glitch */

textarea.addEventListener("keydown",e=>{

if(e.key==="Enter"){

const flash=document.getElementById("flash")
const sound=document.getElementById("glitch")

flash.style.opacity=.8

setTimeout(()=>{
flash.style.opacity=0
},80)

sound.currentTime=0
sound.play()

}

})

</script>

</body>
</html>
