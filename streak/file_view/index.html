
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Reactive UI - Typing Speed</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:monospace;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#020617;
overflow:hidden;
color:#00ffcc;
}

/* background layers */

.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

/* glitch overlay */

.glitch{
position:absolute;
width:100%;
height:100%;
background:repeating-linear-gradient(
0deg,
rgba(0,255,200,0.05) 0px,
rgba(0,255,200,0.05) 2px,
transparent 2px,
transparent 4px
);
mix-blend-mode:overlay;
opacity:0;
}

/* blur pulse */

.blur{
position:absolute;
width:100%;
height:100%;
backdrop-filter:blur(0px);
}

/* editor */

.editor{
position:relative;
width:800px;
height:400px;
border:1px solid rgba(0,255,200,.3);
padding:20px;
background:rgba(0,0,0,.6);
font-size:20px;
line-height:1.6;
overflow:hidden;
}

/* text */

#text{
white-space:pre-wrap;
}

/* caret */

.caret{
display:inline-block;
width:8px;
height:20px;
background:#00ffcc;
margin-left:3px;
animation:blink 1s infinite;
}

@keyframes blink{
50%{opacity:0}
}

</style>
</head>

<body>

<div class="bg">
<div class="glitch" id="glitch"></div>
<div class="blur" id="blur"></div>
</div>

<div class="editor">
<span id="text"></span><span class="caret"></span>
</div>

<textarea id="input" style="opacity:0;position:absolute;"></textarea>

<script>

const textarea=document.getElementById("input")
const textEl=document.getElementById("text")

const glitch=document.getElementById("glitch")
const blur=document.getElementById("blur")

let lastTime=Date.now()
let speed=0

let content=""

document.body.onclick=()=>textarea.focus()

textarea.addEventListener("input",e=>{

let now=Date.now()
let delta=now-lastTime
lastTime=now

// typing speed calculation
speed = 1000 / delta

content=e.target.value
textEl.innerText=content

updateUI(speed)

})

function updateUI(speed){

/* slow typing */

if(speed < 3){

glitch.style.opacity=0
blur.style.backdropFilter="blur(0px)"

document.body.style.background="#020617"

}

/* medium */

else if(speed < 6){

glitch.style.opacity=0.2
blur.style.backdropFilter="blur(2px)"

document.body.style.background="#031a1a"

}

/* fast */

else{

glitch.style.opacity=0.6
blur.style.backdropFilter="blur(6px)"

document.body.style.background="#001111"

/* random shake */

document.querySelector(".editor").style.transform=
`translate(${Math.random()*6-3}px,${Math.random()*6-3}px)`

}

}

/* reset when stop typing */

setInterval(()=>{

speed *= 0.8

if(speed < 2){

glitch.style.opacity=0
blur.style.backdropFilter="blur(0px)"

document.querySelector(".editor").style.transform="translate(0,0)"

}

},100)

</script>

</body>
</html>
