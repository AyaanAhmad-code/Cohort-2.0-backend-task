<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Solar System Universe</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
}
canvas{
display:block;
}
</style>

</head>

<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

camera.position.set(0,5,20)

const renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)


/* LIGHT */

const light = new THREE.PointLight(0xffffff,2)
scene.add(light)


/* SUN */

const sunGeo = new THREE.SphereGeometry(2,32,32)

const sunMat = new THREE.MeshBasicMaterial({
color:0xffcc33
})

const sun = new THREE.Mesh(sunGeo,sunMat)

scene.add(sun)


/* STAR FIELD */

const starGeometry = new THREE.BufferGeometry()
const starCount = 12000

const positions = new Float32Array(starCount*3)

for(let i=0;i<starCount;i++){

positions[i*3]=(Math.random()-0.5)*400
positions[i*3+1]=(Math.random()-0.5)*400
positions[i*3+2]=(Math.random()-0.5)*400

}

starGeometry.setAttribute(
"position",
new THREE.BufferAttribute(positions,3)
)

const starMaterial = new THREE.PointsMaterial({
color:0xffffff,
size:0.5
})

const stars = new THREE.Points(starGeometry,starMaterial)

scene.add(stars)


/* PLANET CREATOR */

function createPlanet(size,color,distance){

const geometry = new THREE.SphereGeometry(size,32,32)

const material = new THREE.MeshStandardMaterial({
color:color
})

const planet = new THREE.Mesh(geometry,material)

const pivot = new THREE.Object3D()

pivot.add(planet)

planet.position.x = distance

scene.add(pivot)

return {planet,pivot}

}


/* PLANETS */

const mercury = createPlanet(0.4,0xaaaaaa,4)
const venus   = createPlanet(0.7,0xffcc88,6)
const earth   = createPlanet(0.8,0x2233ff,9)
const mars    = createPlanet(0.6,0xff5533,12)
const jupiter = createPlanet(1.5,0xffaa88,16)
const saturn  = createPlanet(1.3,0xffddaa,20)


/* SATURN RING */

const ringGeo = new THREE.RingGeometry(2,3,64)
const ringMat = new THREE.MeshBasicMaterial({
color:0xd2b48c,
side:THREE.DoubleSide
})

const ring = new THREE.Mesh(ringGeo,ringMat)

ring.rotation.x = Math.PI/2

saturn.planet.add(ring)


/* MOON */

const moonGeo = new THREE.SphereGeometry(0.2,32,32)
const moonMat = new THREE.MeshStandardMaterial({color:0xffffff})
const moon = new THREE.Mesh(moonGeo,moonMat)

const moonPivot = new THREE.Object3D()

moon.position.x = 1.5

moonPivot.add(moon)
earth.planet.add(moonPivot)


/* MOUSE CAMERA */

let mouseX=0
let mouseY=0

document.addEventListener("mousemove",e=>{

mouseX=(e.clientX/window.innerWidth-0.5)*10
mouseY=(e.clientY/window.innerHeight-0.5)*5

})


/* ANIMATION */

function animate(){

requestAnimationFrame(animate)

/* PLANET ORBITS */

mercury.pivot.rotation.y+=0.02
venus.pivot.rotation.y+=0.015
earth.pivot.rotation.y+=0.01
mars.pivot.rotation.y+=0.008
jupiter.pivot.rotation.y+=0.004
saturn.pivot.rotation.y+=0.003

moonPivot.rotation.y+=0.05

/* CAMERA MOTION */

camera.position.x += (mouseX-camera.position.x)*0.02
camera.position.y += (-mouseY-camera.position.y)*0.02
camera.lookAt(scene.position)

renderer.render(scene,camera)

}

animate()


/* RESIZE */

window.addEventListener("resize",()=>{

camera.aspect=window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()

renderer.setSize(window.innerWidth,window.innerHeight)

})

</script>

</body>
</html>
