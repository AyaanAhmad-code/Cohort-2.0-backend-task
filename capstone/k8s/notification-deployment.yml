apiVersion: apps/v1
kind: Deployment
metadata:
  name:  notification-deployment
  labels:
    name:  notification-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification
  template:
    metadata:
      labels:
        app: notification
    spec:
      containers:
      - image:  277869548052.dkr.ecr.ap-south-1.amazonaws.com/notification
        name:  notification-server
        resources:
          requests:
            cpu: "150m"
            memory: "100M"
          limits:
            cpu: "300m"
            memory: "300M"
        livenessProbe:
          httpGet:
            path: /_status/healthz
            port: 4000
          initialDelaySeconds: 90
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /_status/readyz
            port: 4000
          initialDelaySeconds: 30
          timeoutSeconds: 10
        env:
        - name: EMAIL_USER
          valueFrom:
            secretKeyRef:
              name:  codespace-secrets
              key: EMAIL_USER

        - name: GOOGLE_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name:  codespace-secrets
              key: GOOGLE_CLIENT_ID

        - name: GOOGLE_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name:  codespace-secrets
              key: GOOGLE_CLIENT_SECRET 

        - name: GOOGLE_REFRESH_TOKEN
          valueFrom:
            secretKeyRef:
              name:  codespace-secrets
              key: GOOGLE_REFRESH_TOKEN  

        - name: RABBITMQ_URL
          valueFrom:
            secretKeyRef:
              name:  codespace-secrets
              key: RABBITMQ_URL
        ports:
        - containerPort:  4000
          name:  noti-http